<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>רשימת קניות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#fff;--surface2:#F0EDE6;--border:#E0DBD0;--text:#1A1714;--text2:#6B6459;--text3:#A09890;--green:#2D7A4F;--green-bg:#E8F5EE;--green-light:#B8E0C8;--red:#C0392B;--red-bg:#FDECEA;--red-light:#F5B7B1;--accent:#C9A84C;--accent2:#8B6914;--shadow-lg:0 8px 32px rgba(0,0,0,0.12);--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}
header{background:var(--text);color:white;padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.2)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.header-title span{color:var(--accent)}
.header-btn-group{display:flex;align-items:center;gap:4px}
.list-name-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);cursor:pointer;transition:background 0.2s;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.header-stats-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.header-stats{display:flex;gap:14px;font-size:12px;color:rgba(255,255,255,0.7)}
.stat{display:flex;align-items:center;gap:5px}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-dot.green{background:#5DBE85}.stat-dot.red{background:#E57373}.stat-dot.neutral{background:rgba(255,255,255,0.4)}
.toolbar{background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;position:sticky;top:74px;z-index:90}
.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.search-input{width:100%;padding:9px 34px 9px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:14px;background:var(--bg);color:var(--text);direction:rtl;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.filter-btn{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all 0.18s;white-space:nowrap}
.filter-btn.active{border-color:var(--accent);background:var(--accent);color:white}
.category-tabs{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;display:flex;padding:0 10px;gap:2px;position:sticky;top:130px;z-index:89}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:9px 14px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all 0.18s;background:none;border-top:none;border-right:none;border-left:none}
.cat-tab.active{color:var(--text);border-bottom-color:var(--accent)}
main{padding:12px;max-width:680px;margin:0 auto;padding-bottom:90px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px}
.section-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.section-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:20px}
.item-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:7px;overflow:hidden;transition:all 0.2s;animation:slideIn 0.2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.item-card.status-have{border-color:var(--green-light);background:var(--green-bg)}
.item-card.status-need{border-color:var(--red-light);background:var(--red-bg)}
.item-main{display:flex;align-items:center;padding:12px 12px 12px 8px;gap:10px;user-select:none}
.status-toggle{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.status-btn{width:42px;height:32px;border-radius:7px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all 0.15s;background:white}
.status-btn.btn-have{border-color:var(--green-light);color:var(--green)}
.status-btn.btn-have:hover,.status-btn.btn-have.active{background:var(--green);border-color:var(--green);color:white;transform:scale(1.05)}
.status-btn.btn-need{border-color:var(--red-light);color:var(--red)}
.status-btn.btn-need:hover,.status-btn.btn-need.active{background:var(--red);border-color:var(--red);color:white;transform:scale(1.05)}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
.item-card.status-have .item-name{color:var(--green)}
.item-card.status-need .item-name{color:var(--red)}
.item-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.item-qty{font-size:11px;color:var(--accent2);font-weight:700;background:#FEF3D0;padding:2px 6px;border-radius:10px}.qty-counter{display:flex;align-items:center;gap:6px;margin-top:6px;animation:slideIn 0.15s ease}.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--red-light);background:white;color:var(--red);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all 0.15s;flex-shrink:0}.qty-btn:hover{background:var(--red);color:white;border-color:var(--red)}.qty-display{font-size:15px;font-weight:700;color:var(--red);min-width:28px;text-align:center}.qty-unit{font-size:12px;color:var(--text3)}
.item-note{font-size:11px;color:var(--text2);font-style:italic}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.action-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.action-btn:hover{background:var(--border);color:var(--text)}
.action-btn.delete:hover{background:var(--red-bg);border-color:var(--red-light);color:var(--red)}
.add-fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:white;border:none;padding:11px 22px;border-radius:50px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;transition:transform 0.2s,box-shadow 0.2s;z-index:200}
.add-fab:hover{transform:translateX(-50%) translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
.add-fab .plus{font-size:18px;color:var(--accent);font-weight:300}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:680px;padding:24px 20px 36px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);direction:rtl;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:19px;font-weight:800;margin-bottom:18px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.form-input,.form-select,.form-textarea{width:100%;padding:12px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:15px;color:var(--text);background:var(--bg);direction:rtl;outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:70px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.btn-primary{flex:1;padding:14px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.85}
.btn-secondary{padding:14px 18px;background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
.btn-secondary:hover{background:var(--border)}
.history-item{padding:13px 15px;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all 0.18s;display:flex;justify-content:space-between;align-items:center}
.history-item:hover,.history-item.current{border-color:var(--accent);background:#FFFBF0}
.history-name{font-size:15px;font-weight:700}
.history-date{font-size:11px;color:var(--text3);margin-top:2px}
.del-list-btn{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:4px 7px;border-radius:6px;transition:all 0.15s}
.del-list-btn:hover{background:var(--red-bg);color:var(--red)}
#welcome-screen{position:fixed;inset:0;background:var(--text);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;direction:rtl;transition:opacity 0.4s}
#welcome-screen.hidden{opacity:0;pointer-events:none}
.welcome-logo{font-size:52px;margin-bottom:14px}
.welcome-title{font-size:30px;font-weight:800;color:white;margin-bottom:6px;text-align:center}
.welcome-title span{color:var(--accent)}
.welcome-sub{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:36px;text-align:center}
.welcome-options{width:100%;max-width:400px}
.welcome-option{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;color:white}
.welcome-option:hover{background:rgba(255,255,255,0.13);border-color:var(--accent)}
.welcome-option-icon{font-size:26px;flex-shrink:0}
.welcome-option-title{font-size:16px;font-weight:700;margin-bottom:2px}
.welcome-option-sub{font-size:12px;color:rgba(255,255,255,0.5)}
.welcome-option.new-list{border-color:var(--accent);background:rgba(201,168,76,0.1)}
.empty-state{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-text{font-size:15px;font-weight:500}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:white;padding:10px 22px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;z-index:400;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.shopping-item-row{padding:10px 0;border-bottom:1px solid var(--surface2);font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.shopping-item-row:last-child{border-bottom:none}
.shopping-item-left{display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0}
.rl-link{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;background:#E8F0FE;color:#1a56db;border:1px solid #BDD0FB;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;transition:all 0.15s;font-family:'Heebo',sans-serif}
.rl-link:hover{background:#1a56db;color:white;border-color:#1a56db}
.cat-manage-btn{background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;padding:2px 6px;cursor:pointer;color:var(--text3);transition:all 0.15s}
.cat-manage-btn:hover{background:var(--surface2);color:var(--text)}
.cat-manage-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;background:var(--surface);gap:8px}
.cat-manage-row:hover{border-color:var(--accent)}
.cat-name-edit{font-size:15px;font-weight:600;color:var(--text);cursor:pointer;flex:1;border-bottom:1px dashed var(--border);padding-bottom:1px}
.cat-name-edit:hover{border-bottom-color:var(--accent);color:var(--accent2)}
.cat-actions{display:flex;gap:5px}
.cat-action-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;color:var(--text2);font-family:'Heebo',sans-serif;font-weight:600;transition:all 0.15s;white-space:nowrap}
.cat-action-btn:hover{background:var(--border)}
.cat-action-btn.danger:hover{background:var(--red-bg);border-color:var(--red-light);color:var(--red)}
.move-item-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--surface2);gap:10px}
.move-item-row:last-child{border-bottom:none}
.move-select{padding:5px 9px;border:1.5px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:13px;background:var(--bg);color:var(--text);direction:rtl;outline:none;cursor:pointer}
.move-select:focus{border-color:var(--accent)}
@media(max-width:480px){.item-name{font-size:14px}
  .mic-btn{position:fixed;bottom:22px;left:22px;width:52px;height:52px;border-radius:50%;background:var(--text);border:none;color:white;font-size:22px;cursor:pointer;box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .mic-btn.listening{background:var(--red);animation:micpulse 1s infinite}
  @keyframes micpulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(192,57,43,0.4)}50%{transform:scale(1.08);box-shadow:0 0 0 10px rgba(192,57,43,0)}}
  .voice-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:white;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:600;z-index:500;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 0.25s;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
  .voice-toast.show{opacity:1}.status-btn{width:38px;height:30px;font-size:15px}}50%{transform:scale(1.08);box-shadow:0 0 0 10px rgba(192,57,43,0)}}
</style>
</head>
<body>
<div id="welcome-screen">
  <div class="welcome-logo">&#x1F6D2;</div>
  <div class="welcome-title">&#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05EA; <span>&#x05E7;&#x05E0;&#x05D9;&#x05D5;&#x05EA;</span></div>
  <div class="welcome-sub">&#x05E0;&#x05D9;&#x05D4;&#x05D5;&#x05DC; &#x05D7;&#x05DB;&#x05DD; &#x05E9;&#x05DC; &#x05D4;&#x05DE;&#x05DC;&#x05D0;&#x05D9; &#x05D4;&#x05D1;&#x05D9;&#x05EA;&#x05D9;</div>
  <div class="welcome-options" id="welcome-options"></div>
</div>
<header>
  <div class="header-top">
    <div class="header-title">&#x1F6D2; <span>&#x05E7;&#x05E0;&#x05D9;&#x05D5;&#x05EA;</span></div>
    <div class="header-btn-group" id="header-btn-group"></div>
    <div class="list-name-badge" id="list-name-badge" onclick="openHistoryModal()">&#x1F4CB; &#x05D8;&#x05D5;&#x05E2;&#x05DF;...</div>
  </div>
  <div class="header-stats-row">
    <div class="header-stats" id="header-stats"></div>
    <span id="sync-dot" style="font-size:14px;cursor:default" title="sync">&#x2601;&#xFE0F;</span>
  </div>
</header>
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">&#x1F50D;</span>
    <input class="search-input" id="search-input" type="text" placeholder="&#x05D7;&#x05D9;&#x05E4;&#x05D5;&#x05E9; &#x05E4;&#x05E8;&#x05D9;&#x05D8;..." oninput="renderItems()">
  </div>
  <button class="filter-btn" id="filter-all" onclick="setFilter('all')" style="display:none">&#x05D4;&#x05DB;&#x05DC;</button>
  <button class="filter-btn" id="filter-need" onclick="setFilter('need')" style="display:none">&#x05D7;&#x05E1;&#x05E8;</button>
  <button class="filter-btn" id="filter-have" onclick="setFilter('have')" style="display:none">&#x05D9;&#x05E9;</button>
</div>
<div class="category-tabs" id="category-tabs"></div>
<main id="items-container"></main>

<button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="פקודה קולית">??</button>
<div class="voice-toast" id="voice-toast"></div>
<button class="add-fab" onclick="openAddModal()"><span class="plus">+</span> &#x05D4;&#x05D5;&#x05E1;&#x05E4;&#x05EA; &#x05E4;&#x05E8;&#x05D9;&#x05D8;</button>
<div class="modal-overlay" id="item-modal" onclick="closeModalOnOverlay(event,'item-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">&#x05D4;&#x05D5;&#x05E1;&#x05E4;&#x05EA; &#x05E4;&#x05E8;&#x05D9;&#x05D8; &#x05D7;&#x05D3;&#x05E9;</div>
    <div class="form-group"><label class="form-label">&#x05E9;&#x05DD; &#x05D4;&#x05E4;&#x05E8;&#x05D9;&#x05D8; *</label><input class="form-input" id="item-name-input" type="text"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">&#x05E7;&#x05D8;&#x05D2;&#x05D5;&#x05E8;&#x05D9;&#x05D4;</label><select class="form-select" id="item-cat-input"></select></div>
      <div class="form-group"><label class="form-label">&#x05DB;&#x05DE;&#x05D5;&#x05EA;</label><input class="form-input" id="item-qty-input" type="text"></div>
    </div>
    <div class="form-group"><label class="form-label">&#x05D4;&#x05E2;&#x05E8;&#x05D5;&#x05EA;</label><textarea class="form-textarea" id="item-note-input"></textarea></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveItem()">&#x05E9;&#x05DE;&#x05D9;&#x05E8;&#x05D4;</button>
      <button class="btn-secondary" onclick="closeModal('item-modal')">&#x05D1;&#x05D9;&#x05D8;&#x05D5;&#x05DC;</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="history-modal" onclick="closeModalOnOverlay(event,'history-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">&#x05D4;&#x05D9;&#x05E1;&#x05D8;&#x05D5;&#x05E8;&#x05D9;&#x05D9;&#x05EA; &#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05D5;&#x05EA;</div>
    <div id="history-list"></div>
    <button class="btn-primary" style="width:100%;margin-top:8px" onclick="createNewListFromModal()">+ &#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05D4; &#x05D7;&#x05D3;&#x05E9;&#x05D4;</button>
  </div>
</div>
<div class="modal-overlay" id="newlist-modal" onclick="closeModalOnOverlay(event,'newlist-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">&#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05D4; &#x05D7;&#x05D3;&#x05E9;&#x05D4;</div>
    <div class="form-group"><label class="form-label">&#x05E9;&#x05DD; &#x05D4;&#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05D4;</label><input class="form-input" id="new-list-name" type="text"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="confirmNewList()">&#x05E6;&#x05D5;&#x05E8; &#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05D4;</button>
      <button class="btn-secondary" onclick="closeModal('newlist-modal')">&#x05D1;&#x05D9;&#x05D8;&#x05D5;&#x05DC;</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="shoplist-modal" onclick="closeModalOnOverlay(event,'shoplist-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">&#x1F6CD;&#xFE0F; &#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05EA; &#x05E7;&#x05E0;&#x05D9;&#x05D5;&#x05EA;</div>
    <div id="shoplist-content"></div>

function loadRaw() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch { return {}; } }

function saveState(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  schedulePush();
}

function getState() {
  const s = loadRaw();
  if (!s.lists) s.lists = {};
  if (!s.currentListId) s.currentListId = null;
  if (!s.categories) s.categories = [...DEFAULT_CATEGORIES];
  return s;
}

function getCategories() { return getState().categories || [...DEFAULT_CATEGORIES]; }
function saveCategories(cats) { const s = getState(); s.categories = cats; saveState(s); }
function CATEGORIES() { return getCategories(); }
function getCurrentList() { const s = getState(); return s.lists[s.currentListId]||null; }
function updateCurrentList(fn) { const s = getState(); fn(s.lists[s.currentListId]); saveState(s); }
function makeId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// SUPABASE SYNC
let syncPending = false;
let syncTimer = null;
let lastPushedHash = null;
let lastSeenAt = null;
let pausePollingUntil = 0;

function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i))|0;
  return String(h);
}

function showSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  if (s === 'syncing') { dot.textContent = '\uD83D\uDD04'; dot.title = '\u05DE\u05E1\u05E0\u05DB\u05E8\u05DF...'; }
  else if (s === 'ok') { dot.textContent = '\u2601\uFE0F'; dot.title = '\u05DE\u05E1\u05D5\u05E0\u05DB\u05E8\u05DF'; }
  else { dot.textContent = '\u26A0\uFE0F'; dot.title = '\u05E9\u05D2\u05D9\u05D0\u05EA \u05E1\u05E0\u05DB\u05E8\u05D5\u05DF'; }
}

async function sbFetch(path, opts) {
  opts = opts || {};
  var sep = path.includes('?') ? '&' : '?';
  var fullPath = path + sep + 'apikey=' + encodeURIComponent(SUPABASE_KEY);
  var headers = Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  }, opts.headers || {});
  var fetchOpts = { mode: 'cors', headers: headers };
  if (opts.method) fetchOpts.method = opts.method;
  if (opts.body) fetchOpts.body = opts.body;
  // Wrap in a promise with manual timeout to avoid hanging
  return new Promise(function(resolve, reject) {
    var timer = setTimeout(function(){ reject(new Error('timeout')); }, 10000);
    fetch(SUPABASE_URL + fullPath, fetchOpts)
      .then(function(r){ clearTimeout(timer); resolve(r); })
      .catch(function(e){ clearTimeout(timer); reject(e); });
  });
}

function schedulePush() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(doPush, 1500);
}

async function doPush() {
  if (syncPending) return;
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  const h = hashStr(raw);
  if (h === lastPushedHash) return;
  syncPending = true;
  showSyncStatus('syncing');
  try {
    const res = await sbFetch('/rest/v1/shopping_data', {
      method: 'POST',
      headers: {'Prefer': 'resolution=merge-duplicates,return=minimal'},
      body: JSON.stringify({user_id: USER_ID, data: JSON.parse(raw), updated_at: new Date().toISOString()})
    });
    if (res.ok || res.status === 201) { lastPushedHash = h; showSyncStatus('ok'); }
    else {
      const txt = await res.text();
      console.error('Supabase push failed:', res.status, txt);
      showSyncStatus('error');
    }
  } catch(e) {
    console.error('Supabase push error:', e);
    showSyncStatus('error');
    // Retry after 5s
    setTimeout(schedulePush, 5000);
  }
  finally { syncPending = false; }
}

async function doPull() {
  try {
    const res = await sbFetch('/rest/v1/shopping_data?user_id=eq.' + USER_ID + '&select=data,updated_at', {
      headers: {'Prefer': 'return=representation'}
    });
    const rows = await res.json();
    if (!rows || !rows.length || !rows[0].data) return false;
    const remoteStr = JSON.stringify(rows[0].data);
    lastPushedHash = hashStr(remoteStr);
    lastSeenAt = rows[0].updated_at;
    localStorage.setItem(STORAGE_KEY, remoteStr);
    return true;
  } catch(e) { console.error('Supabase pull error:', e); return false; }
}

function startPolling() {
  setInterval(async () => {
    if (syncPending) return;
      if (Date.now() < pausePollingUntil) return;
    try {
      const res = await sbFetch('/rest/v1/shopping_data?user_id=eq.' + USER_ID + '&select=data,updated_at', {
        headers: {'Prefer': 'return=representation'}
      });
      const rows = await res.json();
      if (!rows || !rows.length || !rows[0].data) return;
      const remoteAt = rows[0].updated_at;
      if (remoteAt === lastSeenAt) return;
      const remoteStr = JSON.stringify(rows[0].data);
      const h = hashStr(remoteStr);
      if (h === lastPushedHash) { lastSeenAt = remoteAt; return; }
      lastSeenAt = remoteAt;
      lastPushedHash = h;
      localStorage.setItem(STORAGE_KEY, remoteStr);
      renderAll();
      showToast('\u05E2\u05D5\u05D3\u05DB\u05DF \u05DE\u05DE\u05DB\u05E9\u05D9\u05E8 \u05D0\u05D7\u05E8 \u2193');
      showSyncStatus('ok');
    } catch(e) {}
  }, 3000);
}

    items = s.lists[s.currentListId].items.map(i=>({...i,id:makeId()}));

    items = DEFAULT_ITEMS.map(d=>({id:makeId(),name:d.name,category:d.category,status:'have',qty:'',note:''}));

function renderItemCard(item) {
  var sc = item.status==='have' ? 'status-have' : item.status==='need' ? 'status-need' : '';
  var div = document.createElement('div');
  div.className = 'item-card ' + sc; div.id = 'card-' + item.id;
  var note = item.note ? '<span class="item-note">' + item.note + '</span>' : '';
  var qtyMeta = item.qty ? '<span class="item-qty">× ' + item.qty + '</span>' : '';
  var qtyCounter = '';
  if (item.status==='need') {
    var nq = item.needQty || 1;
    qtyCounter = '<div class="qty-counter">'
      + '<button class="qty-btn minus-btn">-</button>'
      + '<span class="qty-display">' + nq + '</span>'
      + '<button class="qty-btn plus-btn">+</button>'
      + '<span class="qty-unit">יחידות</span>'
      + '</div>';
  }
  div.innerHTML =
    '<div class="item-main">'
    + '<div class="status-toggle">'
    + '<button class="status-btn btn-have ' + (item.status==='have'?'active':'') + '">✓</button>'
    + '<button class="status-btn btn-need ' + (item.status==='need'?'active':'') + '">✕</button>'
    + '</div><div class="item-info"><div class="item-name">' + item.name + '</div>'
    + '<div class="item-meta">' + qtyMeta + note + '</div>'
    + qtyCounter
    + '</div>'
    + '<div class="item-actions">'
    + '<button class="action-btn edit-btn">✏️</button>'
    + '<button class="action-btn delete-btn delete">🗑️</button>'
    + '</div></div>';
  div.querySelector('.btn-have').onclick = function(){ setStatus(item.id, 'have'); };
  div.querySelector('.btn-need').onclick = function(){ setStatus(item.id, 'need'); };
  div.querySelector('.edit-btn').onclick = function(){ openEditModal(item.id); };
  div.querySelector('.delete-btn').onclick = function(){ deleteItem(item.id); };
  if (item.status==='need') {
    div.querySelector('.plus-btn').onclick = function(){ setNeedQty(item.id, (item.needQty||1)+1); };
    div.querySelector('.minus-btn').onclick = function(){ setNeedQty(item.id, Math.max(1,(item.needQty||1)-1)); };
  }
  return div;
}

function setStatus(itemId, status) {
  updateCurrentList(function(list){
    var item=list.items.find(function(i){return i.id===itemId;});
    if(item){
      item.status=item.status===status?'none':status;
      if(item.status==='need' && !item.needQty) item.needQty=1;
    }
  });
  var item=getCurrentList().items.find(function(i){return i.id===itemId;});
  var card=document.getElementById('card-'+itemId);
  if(card&&item){
    var newCard=renderItemCard(item);
    card.parentNode.replaceChild(newCard, card);
  }
  renderHeader();
}

var _needQtyTimers = {};
function setNeedQty(itemId, qty) {
  // Update UI immediately
  var card=document.getElementById('card-'+itemId);
  if(card){
    var display=card.querySelector('.qty-display');
    if(display) display.textContent=qty;
    var plus=card.querySelector('.plus-btn');
    var minus=card.querySelector('.minus-btn');
    if(plus) plus.onclick=function(){setNeedQty(itemId,qty+1);};
    if(minus) minus.onclick=function(){setNeedQty(itemId,Math.max(1,qty-1));};
  }
  // Debounce the actual save — only write to storage after 600ms of no changes
  // Pause polling for 3s to prevent remote overwrite during edit
  pausePollingUntil = Date.now() + 3000;
  clearTimeout(_needQtyTimers[itemId]);
  _needQtyTimers[itemId] = setTimeout(function(){
    var s=getState();
    var item=s.lists[s.currentListId]&&s.lists[s.currentListId].items.find(function(i){return i.id===itemId;});
    if(item){ item.needQty=qty; localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); schedulePush(); }
  }, 600);
}

function editShoplistName(itemId,el){

  input.value=oldName;

  el.parentNode.replaceChild(input,el);input.focus();input.select();
  function commit(){
    const newName=input.value.trim();
    if(newName&&newName!==oldName){updateCurrentList(list=>{const it=list.items.find(i=>i.id===itemId);if(it)it.name=newName;});renderAll();showToast('\u05E9\u05DD \u05E2\u05D5\u05D3\u05DB\u05DF \u2713');}
    openShopList();
  }
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=oldName;input.blur();}});
}

function shareWhatsApp(){
  const list=getCurrentList();
  const needItems=(list.items||[]).filter(i=>i.status==='need');
  if(!needItems.length){showToast('\u05D0\u05D9\u05DF \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD \u05DC\u05E7\u05E0\u05D5\u05EA');return;}
  const lines=needItems.map(i=>i.name);
  window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

function copyShopList(){
  const list=getCurrentList();
  const needItems=(list.items||[]).filter(i=>i.status==='need');
  if(!needItems.length){showToast('\u05D0\u05D9\u05DF \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD \u05DC\u05E7\u05E0\u05D5\u05EA');return;}
  const lines=needItems.map(i=>i.name);
  const text=lines.join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast('\u05D4\u05D5\u05E2\u05EA\u05E7 \u2713')).catch(()=>showToast('\u05E9\u05D2\u05D9\u05D0\u05D4 \u05D1\u05D4\u05E2\u05EA\u05E7\u05D4'));
}

function openCatMgr(){renderCatMgrList();openModal('catmgr-modal');}

function renderCatMgrList(){
  var cats=getCategories(); var list=getCurrentList();
  var el=document.getElementById('catmgr-list'); el.innerHTML='';
  cats.forEach(function(cat,idx){
    var count=list?(list.items||[]).filter(function(i){return i.category===cat;}).length:0;
    var row=document.createElement('div'); row.className='cat-manage-row';
    var nameEl=document.createElement('span'); nameEl.className='cat-name-edit'; nameEl.textContent=cat;
    nameEl.onclick=(function(el2,c,i){return function(){renameCategoryInline(el2,c,i);};})(nameEl,cat,idx);
    var countEl=document.createElement('span');
    countEl.style.cssText='font-size:12px;color:var(--text3);min-width:38px;text-align:center';
    countEl.textContent=count;
    var actions=document.createElement('div'); actions.className='cat-actions';
    var upBtn=document.createElement('button'); upBtn.className='cat-action-btn'; upBtn.textContent='↑';
    if(idx===0)upBtn.disabled=true;
    upBtn.onclick=(function(i){return function(){moveCatUp(i);};})(idx);
    var downBtn=document.createElement('button'); downBtn.className='cat-action-btn'; downBtn.textContent='↓';
    if(idx===cats.length-1)downBtn.disabled=true;
    downBtn.onclick=(function(i){return function(){moveCatDown(i);};})(idx);
    var delBtn=document.createElement('button'); delBtn.className='cat-action-btn danger'; delBtn.textContent='מחק';
    delBtn.onclick=(function(c){return function(){deleteCategory(c);};})(cat);
    actions.appendChild(upBtn); actions.appendChild(downBtn); actions.appendChild(delBtn);
    row.appendChild(nameEl); row.appendChild(countEl); row.appendChild(actions);
    el.appendChild(row);
  });
}

function renameCategoryInline(el,oldName,idx){
  const input=document.createElement('input');input.value=oldName;
  input.style.cssText='font-family:Heebo,sans-serif;font-size:15px;font-weight:600;border:1.5px solid var(--accent);border-radius:6px;padding:2px 8px;flex:1;outline:none;direction:rtl;min-width:0';
  el.parentNode.replaceChild(input,el);input.focus();input.select();
  function commit(){
    const newName=input.value.trim();
    if(newName&&newName!==oldName){
      const cats=getCategories();cats[idx]=newName;saveCategories(cats);
      const s=getState();Object.values(s.lists||{}).forEach(lst=>{(lst.items||[]).forEach(item=>{if(item.category===oldName)item.category=newName;});});saveState(s);
      if(activeCategory===oldName)activeCategory=newName;
      renderAll();showToast('\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 \u05E2\u05D5\u05D3\u05DB\u05E0\u05D4 \u2713');
    }
    renderCatMgrList();
  }
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=oldName;input.blur();}});
}

function addCategory(){
  const name=document.getElementById('new-cat-input').value.trim();if(!name)return;
  const cats=getCategories();if(cats.includes(name)){showToast('\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 \u05DB\u05D1\u05E8 \u05E7\u05D9\u05D9\u05DE\u05EA');return;}
  cats.push(name);saveCategories(cats);document.getElementById('new-cat-input').value='';
  renderCatMgrList();renderCategoryTabs();showToast('\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 \u05E0\u05D5\u05E1\u05E4\u05D4 \u2713');
}

function deleteCategory(cat){
  const list=getCurrentList();const count=list?(list.items||[]).filter(i=>i.category===cat).length:0;
  const other='\u05D0\u05D7\u05E8';
  if(!confirm(count>0?'\u05DC\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 "'+cat+'" \u05D9\u05E9 '+count+' \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD. \u05D4\u05DD \u05D9\u05D5\u05E2\u05D1\u05E8\u05D5 \u05DC"'+other+'". \u05DC\u05D4\u05DE\u05E9\u05D9\u05DA?':'\u05DC\u05DE\u05D7\u05D5\u05E7 \u05D0\u05EA \u05D4\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 "'+cat+'"?'))return;
  const cats=getCategories().filter(c=>c!==cat);if(!cats.includes(other))cats.push(other);saveCategories(cats);
  const s=getState();Object.values(s.lists||{}).forEach(lst=>{(lst.items||[]).forEach(item=>{if(item.category===cat)item.category=other;});});saveState(s);
  if(activeCategory===cat)activeCategory='\u05D4\u05DB\u05DC';
  renderAll();renderCatMgrList();showToast('\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 \u05E0\u05DE\u05D7\u05E7\u05D4');
}

function moveCatUp(idx){const cats=getCategories();if(idx===0)return;[cats[idx-1],cats[idx]]=[cats[idx],cats[idx-1]];saveCategories(cats);renderCatMgrList();renderAll();}
function moveCatDown(idx){const cats=getCategories();if(idx===cats.length-1)return;[cats[idx],cats[idx+1]]=[cats[idx+1],cats[idx]];saveCategories(cats);renderCatMgrList();renderAll();}

function openCatItemsModal(cat){
  var list=getCurrentList(); if(!list)return;
  var items=(list.items||[]).filter(function(i){return i.category===cat;});
  var allCats=getCategories();
  document.getElementById('catitems-title').textContent='העברת פריטים — '+cat;
  var container=document.getElementById('catitems-list'); container.innerHTML='';
  if(!items.length){
    container.innerHTML='<p style="color:var(--text3);text-align:center;padding:20px">אין פריטים בקטגוריה זו</p>';
    openModal('catitems-modal'); return;
  }
  var intro=document.createElement('div'); intro.style.cssText='font-size:13px;color:var(--text2);margin-bottom:10px';
  intro.textContent='בחר קטגוריה יעד לכל פריט:';
  container.appendChild(intro);
  items.forEach(function(item){
    var row=document.createElement('div'); row.className='move-item-row';
    var label=document.createElement('span'); label.style.cssText='font-size:14px;font-weight:600;flex:1;min-width:0'; label.textContent=item.name;
    var sel=document.createElement('select'); sel.className='move-select';
    allCats.forEach(function(c){var opt=document.createElement('option');opt.value=c;opt.textContent=c;if(c===cat)opt.selected=true;sel.appendChild(opt);});
    sel.onchange=(function(id){return function(){moveItem(id,this.value);};})(item.id);
    row.appendChild(label); row.appendChild(sel); container.appendChild(row);
  });
  openModal('catitems-modal');
}

function moveItem(itemId,newCat){updateCurrentList(list=>{const item=list.items.find(i=>i.id===itemId);if(item)item.category=newCat;});renderAll();showToast('\u05E4\u05E8\u05D9\u05D8 \u05D4\u05D5\u05E2\u05D1\u05E8 \u2713');}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// Handle browser back button — close topmost open modal
window.addEventListener('popstate', function() {
  var modals = ['shoplist-modal','item-modal','history-modal','newlist-modal','catmgr-modal','catitems-modal','confirm-modal'];
  for (var i = modals.length-1; i >= 0; i--) {
    var el = document.getElementById(modals[i]);
    if (el && el.classList.contains('open')) {
      el.classList.remove('open');
      document.body.style.overflow='';
      return;
    }
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')['item-modal','history-modal','newlist-modal','shoplist-modal','catmgr-modal','catitems-modal'].forEach(closeModal);
  if(e.key==='Enter'&&document.getElementById('item-modal').classList.contains('open'))saveItem();
});

(function buildHeader(){
  const btnGroup=document.getElementById('header-btn-group');
  const shopBtn=document.createElement('button');
  shopBtn.style.cssText='background:var(--accent);border:none;border-radius:8px;padding:7px 14px;font-family:Heebo,sans-serif;font-size:14px;font-weight:800;color:#1A1714;cursor:pointer;white-space:nowrap';

// ════════════════════════════════════════════
//  VOICE COMMANDS
// ════════════════════════════════════════════
(function() {
var active = false;
var segments = [];
var silenceTimer = null;
var restarting = false;  // prevents concurrent restarts
var recog = null;

function buildRecog() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  var r = new SR();
  r.lang = 'he-IL';
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 1;

  r.onresult = function(e) {
    var t = e.results[0][0].transcript.trim();
    if (t) {
      segments.push(t);
      showVoiceToast('\uD83C\uDFA4 ' + t);
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(doProcess, 3500);
    }
    // After a result, always restart (one at a time)
    scheduleRestart();
  };

  r.onerror = function(e) {
    restarting = false;
    if (!active) return;
    if (e.error === 'no-speech') {
      scheduleRestart();
    } else if (e.error !== 'aborted') {
      showVoiceToast('\u05E9\u05D2\u05D9\u05D0\u05D4: ' + e.error);
      doStop(false);
    }
  };

  r.onend = function() {
    restarting = false;
    if (active) scheduleRestart();
  };

  return r;
}

function scheduleRestart() {
  if (!active || restarting) return;
  restarting = true;
  setTimeout(function() {
    if (!active) { restarting = false; return; }
    try {
      recog.start();
    } catch(ex) {
      // InvalidStateError = already started; AbortError = stopping
      // Either way, onend will fire and retry
      restarting = false;
    }
  }, 300);
}

function doStop(andProcess) {
  active = false;
  restarting = false;
  clearTimeout(silenceTimer);
  silenceTimer = null;
  try { recog.abort(); } catch(ex) {}
  document.getElementById('mic-btn').classList.remove('listening');
  var segs = segments.slice();
  segments = [];
  if (andProcess && segs.length > 0) {
    vcExecute(segs.join(' ').trim());
  }
}

function doProcess() { doStop(true); }

window.toggleVoice = function() {
  if (active) {
    doProcess();
  } else {
    recog = buildRecog();
    if (!recog) { showVoiceToast('\u05D4\u05D3\u05E4\u05D3\u05E4\u05DF \u05DC\u05D0 \u05EA\u05D5\u05DE\u05DA'); return; }
    active = true;
    restarting = false;
    segments = [];
    clearTimeout(silenceTimer);
    document.getElementById('mic-btn').classList.add('listening');
    showVoiceToast('\uD83C\uDFA4 \u05DE\u05D0\u05D6\u05D9\u05DF... \u05DC\u05D7\u05E5 \u05E9\u05D5\u05D1 \u05DC\u05E1\u05D9\u05D5\u05DD');
    // Auto-cancel after 15s if no speech
    setTimeout(function() {
      if (active && segments.length === 0) doStop(false);
    }, 15000);
    try { recog.start(); } catch(ex) { doStop(false); }
  }
};

function showVoiceToast(msg) {
  var t = document.getElementById('voice-toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._vtTimer);
  window._vtTimer = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function vcExecute(text) {
  var list = getCurrentList();
  if (!list) { showVoiceToast('\u05D0\u05D9\u05DF \u05E8\u05E9\u05D9\u05DE\u05D4 \u05E4\u05E2\u05D9\u05DC\u05D4'); return; }
  var orig = text;
  text = text.toLowerCase().trim();

  var action = 'need', isDel = false, m;
  var needRe = /^(\u05D7\u05E1\u05E8|\u05D0\u05D9\u05DF|\u05E6\u05E8\u05D9\u05DA|\u05DC\u05E7\u05E0\u05D5\u05EA)\s+/;
  var haveRe = /^(\u05D9\u05E9|\u05D9\u05E9 \u05DC\u05D9|\u05DE\u05E6\u05D0\u05EA\u05D9|\u05E0\u05DE\u05E6\u05D0)\s+/;
  var addRe  = /^(\u05D4\u05D5\u05E1\u05E3|\u05E7\u05E0\u05D4|\u05DC\u05D4\u05D5\u05E1\u05D9\u05E3)\s+/;
  var delRe  = /^(\u05DE\u05D7\u05E7|\u05D4\u05E1\u05E8|\u05DC\u05DE\u05D7\u05D5\u05E7)\s+/;

  if      ((m=needRe.exec(text))) { action='need'; text=text.slice(m[0].length); }
  else if ((m=haveRe.exec(text))) { action='have'; text=text.slice(m[0].length); }
  else if ((m=addRe.exec(text)))  { action='need'; text=text.slice(m[0].length); }
  else if ((m=delRe.exec(text)))  { isDel=true;    text=text.slice(m[0].length); }

  var found = vcFindItems(text, list);
  if (found.length === 0) { showVoiceToast('\u05DC\u05D0 \u05D6\u05D9\u05D4\u05D9\u05EA\u05D9: ' + orig); return; }

  updateCurrentList(function(l) {
    found.forEach(function(f) {
      if (isDel) { l.items = l.items.filter(function(i){ return i.id!==f.id; }); return; }
      var it = l.items.find(function(i){ return i.id===f.id; });
      if (!it) {
        if (action==='need') l.items.push({id:makeId(),name:f.name,category:'\u05D0\u05D7\u05E8',qty:'',note:'',status:'need',needQty:f.qty});
        return;
      }
      it.status = action;
      if (action==='need') it.needQty = f.qty;
    });
  });

  pausePollingUntil = Date.now() + 6000;
  renderAll();

  var emoji = isDel ? '\uD83D\uDDD1\uFE0F' : action==='need' ? '\u274C' : '\u2705';
  var names = found.map(function(f){ return f.name+(f.qty>1?' \u00D7'+f.qty:''); }).join(', ');
  showVoiceToast(emoji + ' ' + names);
}

function vcFindItems(text, list) {
  var sorted = list.items.slice().sort(function(a,b){ return b.name.length-a.name.length; });
  var tl = text.toLowerCase();
  var used = [], results = [];
  var HW = {'\u05D0\u05D7\u05EA':1,'\u05D0\u05D7\u05D3':1,'\u05E9\u05EA\u05D9\u05D9\u05DD':2,'\u05E9\u05E0\u05D9':2,'\u05E9\u05E0\u05D9\u05D9\u05DD':2,'\u05E9\u05DC\u05D5\u05E9':3,'\u05E9\u05DC\u05D5\u05E9\u05D4':3,'\u05D0\u05E8\u05D1\u05E2':4,'\u05D0\u05E8\u05D1\u05E2\u05D4':4,'\u05D7\u05DE\u05E9':5,'\u05D7\u05DE\u05D9\u05E9\u05D4':5,'\u05E9\u05E9':6,'\u05E9\u05E9\u05D4':6,'\u05E9\u05D1\u05E2':7,'\u05E9\u05D1\u05E2\u05D4':7,'\u05E9\u05DE\u05D5\u05E0\u05D4':8,'\u05EA\u05E9\u05E2':9,'\u05EA\u05E9\u05E2\u05D4':9,'\u05E2\u05E9\u05E8':10};

  sorted.forEach(function(item) {
    var nl = item.name.toLowerCase();
    var idx = tl.indexOf(nl);
    if (idx===-1) return;
    if (used.some(function(u){ return idx<u.end && idx+nl.length>u.start; })) return;
    var end = idx+nl.length, qty = 1;
    var am = tl.slice(end).match(/^\s*(\d+)/);
    if (am) { qty=parseInt(am[1],10); end+=am[0].length; }
    else {
      var bm = tl.slice(0,idx).match(/(\d+)\s*$/);
      if (bm) { qty=parseInt(bm[1],10); }
      else {
        var aw = tl.slice(end).match(/^\s*([\u05D0-\u05EA]+)/);
        var bw = tl.slice(0,idx).match(/([\u05D0-\u05EA]+)\s*$/);
        if (aw&&HW[aw[1]]) { qty=HW[aw[1]]; end+=aw[0].length; }
        else if (bw&&HW[bw[1]]) qty=HW[bw[1]];
      }
    }
    used.push({start:idx,end:end});
    results.push({id:item.id,name:item.name,qty:qty});
  });
  return results;
}

})();

// Set initial history state so back button can close modals
history.replaceState({modal:null}, '');

(async function init(){
  initWelcome();
  const s=getState();
  if(s.currentListId&&s.lists[s.currentListId])renderAll();
  startPolling();
})();
